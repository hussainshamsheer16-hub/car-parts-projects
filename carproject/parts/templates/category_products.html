<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category.name }} | DriveGear</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-950 text-white">
    <nav class="px-6 py-4 bg-black/70">
        <a href="{% url 'home' %}" class="font-bold text-amber-400">DriveGear</a>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold mb-8">{{ category.name }}</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for item in parts %}
                <a href="{% url 'product_detail' item.id %}" class="block rounded-xl border border-white/10 bg-stone-900 p-4 hover:border-amber-500">
                    {% if item.image %}
                        <img src="{{ item.image.url }}" alt="{{ item.name }}" class="h-48 w-full rounded-lg object-cover">
                    {% endif %}
                    <h2 class="mt-4 text-xl font-semibold">{{ item.name }}</h2>
                    <p class="text-amber-400">Rs {{ item.price }}</p>
                </a>
            {% empty %}
                <p class="text-stone-400">No products found in this category.</p>
            {% endfor %}
        </div>
    </main>
</body>
</html>
