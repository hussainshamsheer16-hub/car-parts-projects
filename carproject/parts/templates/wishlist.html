<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | DriveGear</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-950 text-white">
    <nav class="px-6 py-4 bg-black/70">
        <a href="{% url 'home' %}" class="font-bold text-amber-400">DriveGear</a>
    </nav>
    <main class="max-w-5xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold mb-8">Wishlist</h1>
        <div class="grid gap-4 md:grid-cols-3">
            {% for item in items %}
                <div class="rounded-xl border border-white/10 bg-stone-900 p-5">
                    <h2 class="font-bold">{{ item.product.name }}</h2>
                    <p class="text-amber-400">Rs {{ item.product.price }}</p>
                    <div class="mt-4 flex gap-2">
                        <a href="{% url 'product_detail' item.product.id %}" class="rounded bg-amber-500 px-4 py-2 text-sm font-bold text-black">Details</a>
                        <form method="POST" action="{% url 'toggle_wishlist' item.product.id %}">
                            {% csrf_token %}
                            <button class="rounded border border-red-500 px-4 py-2 text-sm text-red-300">Remove</button>
                        </form>
                    </div>
                </div>
            {% empty %}
                <p class="text-stone-400">No wishlist items yet.</p>
            {% endfor %}
        </div>
    </main>
</body>
</html>
